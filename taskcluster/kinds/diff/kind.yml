loader: taskgraph.loader.transform:loader

transforms:
  - src.transforms.dont_cache_for_hooks:transforms
  - src.transforms.github:transforms
  - src.transforms.github_cached:transforms
  - taskgraph.transforms.run:transforms
  - taskgraph.transforms.task:transforms
  - eije_taskgraph.transforms.common:transforms

task-defaults:
  worker:
    docker-image: {in-tree: ap-checker}
    max-run-time: 1800
    volumes:
      - /builds/worker/checkouts
    taskcluster-proxy: true
  run-on-tasks-for: ["github-pull-request", "github-pull-request-untrusted", "github-issue-comment"]
  optimization:
    skip-unless-changed: ["index.toml", "index/**"]

tasks:
  index:
    worker-type: linux-small
    description: Compute index changes
    attributes:
      artifact_prefix: public/output
    run:
      using: run-task
      command: >-
        cd $VCS_PATH &&
        git config --global user.name "Nobody" &&
        git config --global user.email "nobody@localhost" &&
        git fetch origin main &&
        (git merge origin/main || (git merge --abort && exit 1)) &&
        mkdir -p /builds/worker/output &&
        apwm changes -i ./ -f "${ARCHIPELAGO_INDEX_BASE_REPOSITORY}" -o /builds/worker/output &&
        cd /ap/archipelago &&
        source .venv/bin/activate &&
        python3 aplint_from_diff.py /builds/worker/output $VCS_PATH /builds/worker/output
    worker:
      artifacts:
        - type: directory
          path: /builds/worker/output
          name: public/output
